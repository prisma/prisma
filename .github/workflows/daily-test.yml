name: Daily Test

on:
  workflow_dispatch:
  # Scheduled trigger disabled: ORM iteration is paused; the daily matrix
  # is run on demand. Restore the `schedule:` block below to re-enable.
  # schedule:
  #   - cron: '0 4 * * 1-5'

jobs:
  run_tests:
    uses: ./.github/workflows/test-template.yml
    with:
      reason: daily-test
      jobTimeout: 70
    secrets: inherit
