allowBuilds:
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  sharp: true
  sqlite3: true
  workerd: true
  yarn: true

packages:
  - 'packages/*'

shellEmulator: true
autoInstallPeers: false
savePrefix: ''

overrides:
  form-data: '>=4.0.4'
  jws: '>=4.0.1'
  tar-fs: '>=2.1.4'
  lodash: '>=4.18.1'
  '@tootallnate/once': '>=3.0.1'
  ajv@^8.0.0: '>=8.18.0'
  '@azure/core-rest-pipeline@^1.0.0': '>=1.14.0'
  '@azure/msal-node>uuid': '>=14.0.0'
  fast-uri@<=3.1.3: '>=3.1.4 <4'
  ws@>=8.0.0 <8.20.1: '>=8.20.1'

peerDependencyRules:
  allowedVersions:
    '@octokit/core': '>=3'

minimumReleaseAgeExclude:
  - '@prisma/engines-version@7.10.0-1.6d040c802892de6d56c7e0061b7a10b3e6a0c7a0'
  - '@prisma/prisma-schema-wasm@7.10.0-1.6d040c802892de6d56c7e0061b7a10b3e6a0c7a0'
  - '@prisma/query-compiler-wasm@7.10.0-1.6d040c802892de6d56c7e0061b7a10b3e6a0c7a0'
  - '@prisma/schema-engine-wasm@7.10.0-1.6d040c802892de6d56c7e0061b7a10b3e6a0c7a0'
  - '@prisma/dev@0.24.16'
